name: Update ReproDB Statistics

on:
  # Run monthly on the 1st at 00:00 UTC
  schedule:
    - cron: '0 0 1 * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      refresh_repo_stats:
        description: 'Re-fetch stats for ALL repos (needed for historical snapshots)'
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

jobs:
  update-statistics:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout reprodb-pipeline repository
        uses: actions/checkout@v6
        with:
          path: reprodb-pipeline
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Checkout reprodb.github.io repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/reprodb.github.io
          path: website
          ref: main
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      
      - name: Checkout reprodb-pipeline-results repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/reprodb-pipeline-results
          path: results_archive
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Checkout data-schemas repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/data-schemas
          path: data-schemas
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      
      - name: Install dependencies
        run: |
          cd reprodb-pipeline
          pip install -r requirements-ci.txt
          pip install jsonschema

      - name: Restore HTTP response cache
        uses: actions/cache@v5
        with:
          path: reprodb-pipeline/src/.cache
          key: scraper-cache-${{ hashFiles('reprodb-pipeline/requirements.txt') }}-week${{ github.run_number }}
          restore-keys: |
            scraper-cache-${{ hashFiles('reprodb-pipeline/requirements.txt') }}-
            scraper-cache-

      - name: Create output directories
        run: |
          mkdir -p website/src/_data
          mkdir -p website/src/assets/data
          mkdir -p website/src/assets/charts
      
      - name: Generate timestamp
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "RUN_TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          echo "Pipeline run started at: $TIMESTAMP"
      
      - name: Generate statistics
        run: |
          cd reprodb-pipeline
          python -m src.generators.output.generate_statistics \
            --conf_regex '.*20[12][0-9]' \
            --output_dir ../website/src
      
      - name: Generate repository statistics
        timeout-minutes: 120
        env:
          GITHUB_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          REFRESH_FLAG=""
          # Scheduled runs always refresh; manual runs use the input toggle
          if [[ "${{ github.event_name }}" == "schedule" ]] || [[ "${{ inputs.refresh_repo_stats }}" == "true" ]]; then
            REFRESH_FLAG="--refresh"
          fi
          cd reprodb-pipeline
          python -m src.generators.repository.generate_repo_stats \
            --conf_regex '.*20[12][0-9]' \
            --output_dir ../website/src \
            $REFRESH_FLAG || echo "⚠️ Repository stats generation skipped"
      
      - name: Download DBLP author analysis artifact (if available)
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: dblp-author-analysis.yml
          workflow_conclusion: success
          name: dblp-analysis-results
          path: dblp-results/
          skip_unpack: false
          if_no_artifact_found: warn
        continue-on-error: true
      
      - name: Merge DBLP results if available
        run: |
          if [ -d "dblp-results" ] && [ "$(ls -A dblp-results)" ]; then
            echo "Found DBLP analysis results, merging into website..."
            cp -r dblp-results/_data/* website/src/_data/ 2>/dev/null || true
            cp -r dblp-results/assets/data/* website/src/assets/data/ 2>/dev/null || true
            echo "DBLP results merged successfully"
          else
            echo "⚠️ No recent DBLP analysis results found (pipeline runs separately)"
          fi
      
      - name: Generate per-area author data
        run: |
          cd reprodb-pipeline
          python -m src.generators.authors.generate_area_authors --data_dir ../website/src
      
      - name: Generate committee statistics
        run: |
          cd reprodb-pipeline
          python -m src.generators.generate_committee_stats \
            --conf_regex '.*20[12][0-9]' \
            --output_dir ../website/src || echo "⚠️ Committee statistics failed"

      - name: Generate combined rankings
        run: |
          cd reprodb-pipeline
          python -m src.generators.rankings.generate_combined_rankings --data_dir ../website/src
      
      - name: Generate institution rankings
        run: |
          cd reprodb-pipeline
          python -m src.generators.rankings.generate_institution_rankings --data_dir ../website/src
      
      - name: Generate author profiles
        run: |
          cd reprodb-pipeline
          python -m src.generators.authors.generate_author_profiles --data_dir ../website/src
      
      - name: Generate search data
        run: |
          cd reprodb-pipeline
          python -m src.generators.output.generate_search_data --data_dir ../website/src
      
      - name: Update ranking history
        run: |
          cd reprodb-pipeline
          python -m src.generators.rankings.generate_ranking_history --data_dir ../website/src

      - name: Generate artifact availability
        run: |
          cd reprodb-pipeline
          python -m src.generators.repository.generate_artifact_availability \
            --conf_regex '.*20[12][0-9]' \
            --output_dir ../website/src || echo "⚠️ Artifact availability check failed"

      - name: Generate visualizations
        run: |
          cd reprodb-pipeline
          python -m src.generators.output.generate_visualizations --data_dir ../website/src || echo "⚠️ Visualization generation failed"

      - name: Collect paper citation counts
        timeout-minutes: 60
        run: |
          cd reprodb-pipeline
          python -m src.generators.citations.generate_paper_citations_doi --data_dir ../website/src || echo "⚠️ Paper citation collection failed"

      - name: Verify generated files
        run: |
          echo "Checking generated files..."
          ls -lh website/src/_data/
          ls -lh website/src/assets/data/ || true
          ls -lh website/src/assets/charts/ || true
          echo "Files generated successfully!"
      
      - name: Validate output against JSON schemas
        run: |
          python -c "
          import json, sys, pathlib
          import jsonschema

          schemas_dir = pathlib.Path('data-schemas/schemas')
          if not schemas_dir.exists():
              print('::error::data-schemas not checked out — cannot validate outputs')
              sys.exit(1)

          # Map schema → produced output file. Schemas are validated against the
          # corresponding pipeline output. Add new mappings here as schemas/outputs
          # are added.
          validations = [
              # Top-level / collection outputs
              ('artifacts.schema.json',                'website/src/assets/data/artifacts.json'),
              ('combined_rankings.schema.json',        'website/src/assets/data/combined_rankings.json'),
              ('institution_rankings.schema.json',     'website/src/_data/institution_rankings.json'),
              ('institution_ranking_history.schema.json', 'website/src/assets/data/institution_ranking_history.json'),
              ('ranking_history.schema.json',          'website/src/assets/data/ranking_history.json'),
              ('search_data.schema.json',              'website/src/assets/data/search_data.json'),
              ('artifact_availability.schema.json',    'website/src/assets/data/artifact_availability.json'),
              ('author_profiles.schema.json',          'website/src/assets/data/author_profiles.json'),
              ('ae_members.schema.json',               'website/src/assets/data/ae_members.json'),
              ('ae_chairs.schema.json',                'website/src/assets/data/ae_chairs.json'),
              ('chair_stats.schema.json',              'website/src/assets/data/chair_stats.json'),
              ('committee_stats.schema.json',          'website/src/assets/data/committee_stats.json'),
              ('participation_stats.schema.json',      'website/src/assets/data/participation_stats.json'),
              ('repo_stats.schema.json',               'website/src/assets/data/repo_stats.json'),
              ('repo_stats_yearly.schema.json',        'website/src/assets/data/repo_stats_yearly.json'),
              ('top_repos.schema.json',                'website/src/assets/data/top_repos.json'),
              # _data/ Liquid-consumed outputs
              ('summary.schema.json',                  'website/src/_data/summary.yml'),
              ('artifacts_by_conference.schema.json',  'website/src/_data/artifacts_by_conference.yml'),
              ('artifacts_by_year.schema.json',        'website/src/_data/artifacts_by_year.yml'),
              ('repo_stats_summary.schema.json',       'website/src/_data/repo_stats.yml'),
          ]

          import yaml
          errors = 0
          missing = 0
          validated = 0
          for schema_file, data_file in validations:
              schema_path = schemas_dir / schema_file
              data_path = pathlib.Path(data_file)
              if not schema_path.exists():
                  print(f'::warning::Schema not found: {schema_file}')
                  continue
              if not data_path.exists():
                  print(f'::notice::Output not produced this run: {data_file}')
                  missing += 1
                  continue
              schema = json.loads(schema_path.read_text())
              text = data_path.read_text()
              data = yaml.safe_load(text) if data_path.suffix in ('.yml', '.yaml') else json.loads(text)
              try:
                  jsonschema.validate(data, schema)
                  print(f'✅ {data_file} validates against {schema_file}')
                  validated += 1
              except jsonschema.ValidationError as e:
                  print(f'::error file={data_file}::FAILS {schema_file}: {e.message}')
                  print(f'   Path: {list(e.absolute_path)[:5]}')
                  errors += 1

          print()
          print(f'Validated: {validated}, Missing: {missing}, Errors: {errors}')
          if errors:
              sys.exit(1)
          "
      
      - name: Push to results archive
        if: github.repository_owner == 'ReproDB'
        run: |
          cd results_archive
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Copy all website data (generated outputs) to archive
          mkdir -p output/website_data
          cp -r ../website/src/_data output/website_data/ 2>/dev/null || true
          cp -r ../website/src/assets output/website_data/ 2>/dev/null || true
          cp -r ../website/src/_build output/website_data/ 2>/dev/null || true
          
          # Copy the scraped artifacts.json (pipeline input) to output root
          cp ../website/src/assets/data/artifacts.json output/artifacts.json 2>/dev/null || true
          
          # Create run summary
          cat > output/RUN_SUMMARY.txt <<EOF
          Pipeline Run Summary
          ====================
          Timestamp: ${{ env.RUN_TIMESTAMP }}
          Status: SUCCESS
          
          Generated Outputs:
          - Statistics data (artifacts.json, summary.json)
          - Repository statistics (repo_stats.yml, repo_stats_detail.json)
          - Per-area author data (*_authors.json, *_conf_authors.json)
          - Combined rankings (*_combined_rankings.json)
          - Institution rankings (*_institution_rankings.json)
          - Author profiles (author_profiles.json)
          - Search data (search_data.json)
          - Ranking history (ranking_history.json)
          
          Consumed Inputs (from DBLP workflow artifact):
          - authors.json, author_index.json, paper_authors_map.json
          - authors.yml, author_summary.yml, papers.json
          EOF
          
          git add output/
          
          if git diff --staged --quiet; then
            echo "No changes to commit to archive"
          else
            git commit -m "Archive pipeline run from ${{ env.RUN_TIMESTAMP }}"
            git push
            echo "Archive pushed successfully"
          fi
      
      - name: Commit and push to main branch
        if: github.repository_owner == 'ReproDB'
        run: |
          cd website
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Add all generated files
          git add src/_data/ src/assets/ src/_build/
          
          # Check if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update statistics from pipeline run ${{ env.RUN_TIMESTAMP }}"
            git pull --rebase origin main
            git push origin main
            echo "Changes pushed to main branch successfully"
          fi
      
      - name: Summary
        run: |
          echo "## Pipeline Statistics Update Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏰ **Run Timestamp**: ${{ env.RUN_TIMESTAMP }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tasks Completed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Statistics generated" >> $GITHUB_STEP_SUMMARY
          echo "✅ Repository statistics collected" >> $GITHUB_STEP_SUMMARY
          echo "✅ Visualizations created" >> $GITHUB_STEP_SUMMARY
          echo "✅ Per-area author data generated" >> $GITHUB_STEP_SUMMARY
          echo "✅ Ranked data compiled" >> $GITHUB_STEP_SUMMARY
          echo "✅ Results archived to reprodb-pipeline-results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Debug branch updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Repositories Updated" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 reprodb-pipeline-results: Timestamped archive" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 reprodb.github.io (debug branch): Website data" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "- 🔍 Review changes in [debug branch](https://github.com/${{ github.repository_owner }}/reprodb.github.io/tree/debug)" >> $GITHUB_STEP_SUMMARY
          echo "- ✔️ Test website rendering at debug branch deploy preview" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 View archived data in [reprodb-pipeline-results](https://github.com/${{ github.repository_owner }}/reprodb-pipeline-results)" >> $GITHUB_STEP_SUMMARY
