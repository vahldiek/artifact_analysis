# Affiliation normalization rules.
# Each entry maps a set of regex patterns (OR'd) to a canonical institution name.
# Order matters: more specific patterns must come before broader ones.
# All patterns are matched case-insensitively.

- canonical: Massachusetts Institute of Technology
  patterns:
    - '^MIT\b'
    - '\bMIT\b.*\b(Cambridge|CSAIL|Lincoln)\b'
    - '\bMassachusetts\s+Institute\s+of\s+Technology\b'
    - '\bMassachusetts\s+Inst\.?\s+of\s+Technology\b'

- canonical: EPFL
  patterns:
    - '^EPFL\b'
    - '\bEPFL\b'
    - '\bSwiss\s+Federal\s+Institute\s+of\s+Technology\s+in\s+Lausanne\b'
    - '\bEcole\s+Polytechnique\s+Federale\s+de\s+Lausanne\b'
    - '\bÉcole\s+Polytechnique\s+Fédérale\s+de\s+Lausanne\b'

- canonical: ETH Zurich
  patterns:
    - '^ETH\b'
    - '^ETH\s+Z'
    - '\bETH\s+Zurich\b'
    - '\bETH\s+Zrich\b'
    - '\bETH\s+Zürich\b'
    - '\bETHZ\b'
    - '^Department\s+of\s+Computer\s+Science,\s+ETH'

- canonical: Max Planck Society
  patterns:
    - 'Max[\s-]+Planck'
    - '\bMPI[- ]?SWS\b'
    - '\bMPI[- ]?SP\b'
    - '\bMPI[- ]?INF\b'

- canonical: CISPA Helmholtz Center for Information Security
